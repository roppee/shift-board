const INITIAL_SHIFTS = [
  { key:"早番", label:"早番", short:"早", startH:7,  endH:15, color:"#d97706", bg:"#fef9ee", text:"#92400e" },
  { key:"遅番", label:"遅番", short:"遅", startH:14, endH:22, color:"#3b82f6", bg:"#eff6ff", text:"#1e40af" },
  { key:"日勤", label:"日勤", short:"日", startH:9,  endH:18, color:"#059669", bg:"#f0fdf7", text:"#065f46" },
  { key:"夜勤", label:"夜勤", short:"夜", startH:22, endH:31, color:"#7c3aed", bg:"#f5f3ff", text:"#4c1d95" },
];
const PILL_COLORS = [
  { color:"#d97706", bg:"#fef9ee", text:"#92400e" },{ color:"#3b82f6", bg:"#eff6ff", text:"#1e40af" },
  { color:"#059669", bg:"#f0fdf7", text:"#065f46" },{ color:"#7c3aed", bg:"#f5f3ff", text:"#4c1d95" },
  { color:"#e11d48", bg:"#fff1f2", text:"#9f1239" },{ color:"#0891b2", bg:"#ecfeff", text:"#164e63" },
  { color:"#65a30d", bg:"#f7fee7", text:"#3a5c02" },{ color:"#c026d3", bg:"#fdf4ff", text:"#701a75" },
];
const DOW = ["日","月","火","水","木","金","土"];
const COLORS = ["#0ea5e9","#f43f5e","#8b5cf6","#f59e0b","#10b981","#ec4899","#06b6d4","#84cc16","#ef4444","#a855f7","#14b8a6","#f97316","#6366f1","#22c55e","#e879f9"];
const DEFAULT_CONSTRAINTS = { minWorkDays:15, maxWorkDays:22, minWorkHours:120, maxWorkHours:180, maxConsecutive:5, unavailableDows:[], preferredShifts:["早番","遅番","日勤","夜勤"] };
const DEFAULT_REQUIRED = { 早番:2, 遅番:2, 日勤:2, 夜勤:1 };
const ORDER_CONSTRAINTS_DEFAULT = { 早番:["夜勤"], 夜勤:["早番"], 遅番:[], 日勤:[] };
const INITIAL_STAFF = [
  { id:1,  name:"伊藤 奈々",   role:"正社員", color:COLORS[0],  gender:"female" },
  { id:2,  name:"加藤 陽菜",   role:"正社員", color:COLORS[1],  gender:"female" },

  { id:5,  name:"鈴木 葵",     role:"正社員", color:COLORS[4],  gender:"female" },
  { id:6,  name:"田中 花子",   role:"正社員", color:COLORS[5],  gender:"female" },
  { id:7,  name:"中村 さくら", role:"正社員", color:COLORS[6],  gender:"female" },
  { id:8,  name:"林 美穂",     role:"正社員", color:COLORS[7],  gender:"female" },
  { id:9,  name:"渡辺 理恵",   role:"正社員", color:COLORS[8],  gender:"female" },
  { id:10, name:"吉田 梨花",   role:"正社員", color:COLORS[9],  gender:"female" },
  { id:11, name:"井上 拓也",   role:"正社員", color:COLORS[10], gender:"male"   },
  { id:12, name:"小林 健二",   role:"正社員", color:COLORS[11], gender:"male"   },
  { id:13, name:"橋本 修平",   role:"正社員", color:COLORS[12], gender:"male"   },
  { id:14, name:"松本 大樹",   role:"正社員", color:COLORS[13], gender:"male"   },

// ── ユーティリティ ─────────────────────────────────────────
const getDaysInMonth = (y,m) => new Date(y,m+1,0).getDate();
const getDow = (y,m,d) => new Date(y,m,d).getDay();
const fmt2 = n => String(n).padStart(2,"0");
const dateKey = (y,m,d) => `${y}-${fmt2(m+1)}-${fmt2(d)}`;
function getWeekDates(base) {
  const d = new Date(base);
  const offset = (d.getDay()+6)%7;
  const mon = new Date(d); mon.setDate(d.getDate()-offset);
  return Array.from({length:7},(_,i)=>{ const dd=new Date(mon); dd.setDate(mon.getDate()+i); return dd; });
}

// ── 自動生成エンジン ───────────────────────────────────────
function autoGenerate(employees, year, month, wishdays, constraints, required, shiftHours, customShifts, orderConstraints, lockedInitial, prevMonthTail) {
  const days = getDaysInMonth(year, month);
  const OC = orderConstraints || ORDER_CONSTRAINTS_DEFAULT;
  const result = {};
  employees.forEach(e => { result[e.id] = {}; });

  // ロック済みセルを最初に確定（autoGenerateが上書きしない）
  if (lockedInitial) {
    employees.forEach(emp => {
      Object.entries(lockedInitial[emp.id] || {}).forEach(([d, v]) => {
        result[emp.id][Number(d)] = v;
      });
    });
  }

  // 希望休を先に確定（ロックより希望休を優先しない：ロック済みは上書きしない）
  employees.forEach(emp => {
    const ws = wishdays[emp.id] || new Set();
    for (let d=1; d<=days; d++) {
      if (!result[emp.id][d] && ws.has(dateKey(year,month,d))) result[emp.id][d]="希望休";
    }
  });

  const getC = emp => constraints[emp.id] || DEFAULT_CONSTRAINTS;

  // 各スタッフの残り出勤可能日数（未確定日数）
  const remainAvailDays = (id, fromDay) => {
    let cnt = 0;
    for (let d=fromDay; d<=days; d++) { if (!result[id][d]) cnt++; }
    return cnt;
  };

  // 残り必要最低勤務日数
  const remainNeeded = (id) => {
    const c = getC(employees.find(e=>e.id===id));
    const worked = Object.values(result[id]).filter(v=>!["休み","希望休"].includes(v)).length;
    return Math.max(0, c.minWorkDays - worked);
  };

  for (let d=1; d<=days; d++) {
    const dow = getDow(year,month,d);
    const avail = employees.filter(emp => !result[emp.id][d] && !getC(emp).unavailableDows.includes(dow));

    const workCount  = id => Object.values(result[id]).filter(v=>!["休み","希望休"].includes(v)).length;
    const hoursCount = id => Object.values(result[id]).reduce((a,v)=>a+(shiftHours[v]||0),0);
    const consec = id => {
      let c=0;
      if (d===1 && prevMonthTail) {
        for (let dd=prevMonthTail.totalDays; dd>=1; dd--) {
          const s=prevMonthTail.shifts?.[id]?.[dd]||"休み";
          if(!["休み","希望休"].includes(s)) c++; else break;
        }
        return c;
      }
      for(let dd=d-1;dd>=1;dd--){ if(!["休み","希望休"].includes(result[id][dd]||""))c++; else break; }
      return c;
    };
    const checkOrder = (id,type) => {
      const prev = d===1
        ? (prevMonthTail?.shifts?.[id]?.[prevMonthTail.totalDays] || null)
        : result[id][d-1];
      if(!prev) return true;
      return !(OC[prev]||[]).includes(type);
    };

    for (const s of customShifts) {
      const needed=required[s.key]||0; if(!needed) continue;
      let assigned=0;

      // ランダムシャッフル後、残り必要日数の逼迫度が高い人を優先
      const shuffled=[...avail].sort(()=>Math.random()-0.5);
      shuffled.sort((a,b)=>{
        const ra=remainAvailDays(a.id, d)||1;
        const rb=remainAvailDays(b.id, d)||1;
        const na=remainNeeded(a.id);
        const nb=remainNeeded(b.id);
        return (nb/rb)-(na/ra);
      });

      // パス1: 全制約を守って割り当て
      for (const emp of shuffled) {
        if (assigned>=needed||result[emp.id][d]) continue;
        const c=getC(emp);
        if (!c.preferredShifts.includes(s.key)) continue;
        if (consec(emp.id)>=c.maxConsecutive) continue;
        if (workCount(emp.id)>=c.maxWorkDays) continue;
        if (hoursCount(emp.id)+(s.endH-s.startH)>c.maxWorkHours) continue;
        if (!checkOrder(emp.id,s.key)) continue;
        result[emp.id][d]=s.key; assigned++;
      }

      // パス2: まだ不足なら 上限日数・上限時間・連続勤務 を緩めて再試行
      if (assigned < needed) {
        for (const emp of shuffled) {
          if (assigned>=needed||result[emp.id][d]) continue;
          const c=getC(emp);
          if (!c.preferredShifts.includes(s.key)) continue;
          if (!checkOrder(emp.id,s.key)) continue;
          // 連続勤務は上限+1まで許容、日数・時間上限は無視
          if (consec(emp.id)>=c.maxConsecutive+1) continue;
          result[emp.id][d]=s.key; assigned++;
        }
      }

      // パス3: それでも不足なら順序制約も緩めて最後の手段
      if (assigned < needed) {
        for (const emp of shuffled) {
          if (assigned>=needed||result[emp.id][d]) continue;
          const c=getC(emp);
          if (!c.preferredShifts.includes(s.key)) continue;
          result[emp.id][d]=s.key; assigned++;
        }
      }
    }

    // 未割り当ては休み
    employees.forEach(emp=>{ if(!result[emp.id][d]) result[emp.id][d]="休み"; });
  }
  return result;
}

// ── メインアプリ ───────────────────────────────────────────
function App() {
  const today = new Date();
  const [currentDate, setCurrentDate] = useState(new Date(today.getFullYear(),today.getMonth(),1));
  const [view, setView]               = useState("month");
  const [tab, setTab]                 = useState("shift");
  const [staffList, setStaffList]     = useState(INITIAL_STAFF);
  const [staffShifts, setStaffShifts] = useState({});
  const [wishdays, setWishdays]       = useState({});
  const [constraints, setConstraints] = useState({});
  const [required, setRequired]       = useState(DEFAULT_REQUIRED);
  const [customShifts, setCustomShifts] = useState(INITIAL_SHIFTS);
  const [orderConstraints, setOrderConstraints] = useState(ORDER_CONSTRAINTS_DEFAULT);
  const [editCell, setEditCell]       = useState(null);
  const [lockedCells, setLockedCells] = useState({});
  const [savedMonths, setSavedMonths] = useState({}); // { "2026-4": {empId: {day: shiftKey}} }
  const [msg, setMsg]                 = useState("");
  const [newName, setNewName]         = useState("");
  const [newGender, setNewGender]     = useState("female");
  const [newRole, setNewRole]         = useState("正社員");
  const [editEmpId, setEditEmpId]     = useState(null);
  const [editEmpName, setEditEmpName] = useState("");
  const [editEmpGender, setEditEmpGender] = useState("female");
  const [editEmpRole, setEditEmpRole] = useState("正社員");
  const [selConstraint, setSelConstraint] = useState(INITIAL_STAFF[0]?.id||null);
  const [wishDate, setWishDate]       = useState(new Date(today.getFullYear(),today.getMonth(),1));
  const [personalId, setPersonalId]   = useState(INITIAL_STAFF[0]?.id||null);

  const SHIFT_TYPES = useMemo(()=>{
    const obj={};
    customShifts.forEach(s=>{ obj[s.key]={ label:s.label, short:s.short, hours:`${fmt2(s.startH)}:00-${s.endH>24?`翌${fmt2(s.endH-24)}:00`:fmt2(s.endH)+":00"}`, color:s.color, bg:s.bg, text:s.text }; });
    return {...obj,...FIXED_TYPES};
  },[customShifts]);

  const SHIFT_HOURS = useMemo(()=>{ const obj={休み:0,希望休:0}; customShifts.forEach(s=>{obj[s.key]=s.endH-s.startH;}); return obj; },[customShifts]);

  const year=currentDate.getFullYear(), month=currentDate.getMonth();
  const daysInMonth=getDaysInMonth(year,month);
  const weekDates=getWeekDates(currentDate);
  const showMsg = m => { setMsg(m); setTimeout(()=>setMsg(""),3000); };

  // デザイントークン
  const C = { bg:"#f7f8fc",surface:"#fff",surface2:"#f1f5f9",border:"#e2e8f0",border2:"#cbd5e1",text:"#1e293b",textSub:"#64748b",textMute:"#94a3b8",accent:"#3b82f6",accentBg:"#eff6ff",green:"#059669",greenBg:"#f0fdf4",amber:"#d97706",amberBg:"#fffbeb",red:"#dc2626",redBg:"#fff5f5" };
  const S = {
    th: w=>({ padding:"6px 3px",borderBottom:`2px solid ${C.border2}`,fontWeight:700,fontSize:10,textAlign:"center",minWidth:w,maxWidth:w,color:C.textMute,background:C.surface }),
    input: { padding:"8px 12px",borderRadius:8,border:`1px solid ${C.border}`,background:C.surface,color:C.text,fontSize:13,outline:"none",minWidth:120 },
    label: { display:"block",fontSize:11,color:C.textSub,marginBottom:4,fontWeight:600 },
    btn: (bg,c="#fff") => ({ padding:"7px 16px",borderRadius:8,border:"none",background:bg,color:c,fontWeight:700,cursor:"pointer",fontSize:12,whiteSpace:"nowrap",fontFamily:"inherit" }),
    card: { background:C.surface,border:`1px solid ${C.border}`,borderRadius:12,padding:"16px 18px",boxShadow:"0 1px 4px rgba(0,0,0,0.05)" },
  };

  // 統計
  const stats = useMemo(()=>staffList.map(emp=>{
    const s=staffShifts[emp.id]||{};
    const workDays=Object.values(s).filter(v=>!["休み","希望休"].includes(v)).length;
    const workHours=Object.values(s).reduce((a,v)=>a+(SHIFT_HOURS[v]||0),0);
    const wishOff=Object.values(s).filter(v=>v==="希望休").length;
    const c=constraints[emp.id]||DEFAULT_CONSTRAINTS;
    return{...emp,workDays,workHours,wishOff,daysOk:workDays>=c.minWorkDays&&workDays<=c.maxWorkDays,hoursOk:workHours>=c.minWorkHours&&workHours<=c.maxWorkHours};
  }),[staffList,staffShifts,constraints,SHIFT_HOURS]);

  // アラート計算
  const staffingAlerts = useMemo(()=>{
    const alerts=[];
    for(let d=1;d<=daysInMonth;d++){
      const dow=getDow(year,month,d);
      customShifts.forEach(s=>{
        const needed=required[s.key]||0; if(!needed)return;
        const actual=staffList.filter(emp=>staffShifts[emp.id]?.[d]===s.key).length;
        if(actual<needed) alerts.push({d,dow,shiftKey:s.key,needed,actual,shortage:needed-actual});
      });
    }
    return alerts;
  },[staffShifts,required,customShifts,staffList,year,month,daysInMonth]);

  const constraintAlerts = useMemo(()=>{
    const alerts=[];
    staffList.forEach(emp=>{
      const s=staffShifts[emp.id]||{};
      const c=constraints[emp.id]||DEFAULT_CONSTRAINTS;
      const workDays=Object.values(s).filter(v=>!["休み","希望休"].includes(v)).length;
      const workHours=Object.values(s).reduce((a,v)=>a+(SHIFT_HOURS[v]||0),0);
      const reasons=[];
      if(workDays<c.minWorkDays) reasons.push(`勤務日数不足 (${workDays}/${c.minWorkDays}日)`);
      if(workDays>c.maxWorkDays) reasons.push(`勤務日数超過 (${workDays}/${c.maxWorkDays}日)`);
      if(workHours<c.minWorkHours) reasons.push(`勤務時間不足 (${workHours}h/${c.minWorkHours}h)`);
      if(workHours>c.maxWorkHours) reasons.push(`勤務時間超過 (${workHours}h/${c.maxWorkHours}h)`);
      let max=0,cur=0;
      for(let d=1;d<=daysInMonth;d++){ const t=s[d]||"休み"; if(!["休み","希望休"].includes(t)){cur++;max=Math.max(max,cur);}else{cur=0;} }
      if(max>c.maxConsecutive) reasons.push(`連続勤務超過 (${max}連勤/${c.maxConsecutive}日上限)`);
      for(let d=2;d<=daysInMonth;d++){ const prev=s[d-1],cur2=s[d]; if(prev&&cur2&&(orderConstraints[prev]||[]).includes(cur2)) reasons.push(`順序違反: ${d-1}日${prev}→${d}日${cur2}`); }
      if(reasons.length) alerts.push({emp,workDays,workHours,reasons});
    });
    return alerts;
  },[staffList,staffShifts,constraints,SHIFT_HOURS,year,month,daysInMonth,orderConstraints]);

  const totalAlerts=staffingAlerts.length+constraintAlerts.length;

  function exportPDF(){
    const days=Array.from({length:daysInMonth},(_,i)=>i+1);
    const title=`勤務表　${year}年${month+1}月`;
    const pillHtml=type=>{
      const t=SHIFT_TYPES[type]||FIXED_TYPES["休み"];
      return `<span style="display:inline-block;width:18px;height:18px;line-height:18px;border-radius:3px;font-size:9px;font-weight:700;background:${t.bg};color:${t.text};border:1px solid ${t.color}88;text-align:center;">${t.short}</span>`;
    };

    const chunkSize=13;
    const pages=[];
    for(let i=0;i<staffList.length;i+=chunkSize) pages.push(staffList.slice(i,i+chunkSize));

    const makeTable=(chunk,pi)=>{
      const headerCols=days.map(d=>{
        const dow=getDow(year,month,d);
        const isSun=dow===0,isSat=dow===6;
        const color=isSun?"#ef4444":isSat?"#3b82f6":"#475569";
        return `<td class="dc" style="color:${color};background:#f8fafc;font-weight:700;font-size:9px;text-align:center;padding:2px 0;">${d}<br/><span style="font-size:7px">${DOW[dow]}</span></td>`;
      }).join("");
      const rows=chunk.map((emp,ei)=>{
        const bg=ei%2===0?"#fff":"#f8fafc";
        const cells=days.map(d=>{
          const type=staffShifts[emp.id]?.[d]||"休み";
          return `<td class="dc" style="padding:1px 0;text-align:center;background:${bg};">${pillHtml(type)}</td>`;
        }).join("");
        const wd=days.filter(d=>!["休み","希望休"].includes(staffShifts[emp.id]?.[d]||"休み")).length;
        const wh=days.reduce((a,d)=>a+(SHIFT_HOURS[staffShifts[emp.id]?.[d]]||0),0);
        return `<tr>
          <td class="nc" style="background:${bg};padding:2px 5px;white-space:nowrap;overflow:hidden;">
            <span style="display:inline-block;width:6px;height:6px;border-radius:50%;background:${emp.color};margin-right:3px;vertical-align:middle;"></span>
            <span style="font-size:11px;font-weight:700;">${emp.name}</span>
          </td>
          ${cells}
          <td class="wc" style="background:${bg};padding:1px 2px;text-align:center;font-size:11px;font-weight:700;color:#0369a1;">${wd}日</td>
          <td class="hc" style="background:${bg};padding:1px 2px;text-align:center;font-size:11px;font-weight:700;color:#059669;">${wh}h</td>
        </tr>`;
      }).join("");
      const pageBreak=pi>0?`<div class="pb"></div>`:"";
      return `${pageBreak}
      <div class="page">
        <div class="ttl">${title}　<span class="sub">出力日: ${today.getFullYear()}年${today.getMonth()+1}月${today.getDate()}日${pages.length>1?`　(${pi+1}/${pages.length})`:""}</span></div>
        <table>
          <thead><tr>
            <td class="nc" style="background:#f1f5f9;font-size:10px;font-weight:700;padding:2px 5px;">氏名</td>
            ${headerCols}
            <td class="wc" style="background:#f1f5f9;font-size:9px;font-weight:700;text-align:center;padding:1px 2px;">勤務</td>
            <td class="hc" style="background:#f1f5f9;font-size:9px;font-weight:700;text-align:center;padding:1px 2px;">時間</td>
          </tr></thead>
          <tbody>${rows}</tbody>
        </table>
      </div>`;
    };

    const pageHtmls=pages.map((chunk,pi)=>makeTable(chunk,pi)).join("");

    const html=`<!DOCTYPE html><html><head><meta charset="utf-8"/><title>${title}</title><style>
*{box-sizing:border-box;margin:0;padding:0;}

  // 当月を確定保存して翌月へ
  function confirmAndNextMonth() {
    if (!window.confirm(`${year}年${month+1}月のシフトを確定して翌月へ進みますか？\n確定後も編集は可能ですが、先月欄への表示に使われます。`)) return;
    const key = `${year}-${month+1}`;
    setSavedMonths(prev => ({...prev, [key]: staffShifts}));
    setCurrentDate(new Date(year, month+1, 1));
    showMsg(`✓ ${year}年${month+1}月を確定しました`);
  }

  // 先月末の表示日数：全スタッフのmaxConsecutive最大値 - 1
  const prevTailCount = useMemo(() => {
    const max = staffList.reduce((a, emp) => {
      const c = constraints[emp.id] || DEFAULT_CONSTRAINTS;
      return Math.max(a, c.maxConsecutive);
    }, DEFAULT_CONSTRAINTS.maxConsecutive);
    return Math.max(1, max - 1);
  }, [staffList, constraints]);

  // 先月末データを取得
  const prevMonthTail = useMemo(() => {
    const prevYear = month === 0 ? year-1 : year;
    const prevMonth = month === 0 ? 12 : month;
    const key = `${prevYear}-${prevMonth}`;
    const saved = savedMonths[key];
    if (!saved) return null;
    const prevDays = getDaysInMonth(prevYear, prevMonth-1);
    const tail = {};
    staffList.forEach(emp => {
      tail[emp.id] = {};
      for (let i=0; i<prevTailCount; i++) {
        const d = prevDays - i;
        if (d >= 1) tail[emp.id][d] = saved[emp.id]?.[d] || "休み";
      }
    });
    return { shifts: tail, totalDays: prevDays, tailCount: prevTailCount };
  }, [savedMonths, year, month, staffList, prevTailCount]);

  // アクション
  function runAutoGenerate() {
    // ロック済みセルを「確定済み初期値」としてautoGenerateに渡す
    const lockedInitial = {};
    staffList.forEach(emp => {
      const locked = lockedCells[emp.id] || new Set();
      lockedInitial[emp.id] = {};
      locked.forEach(d => {
        const cur = staffShifts[emp.id]?.[d];
        if (cur) lockedInitial[emp.id][d] = cur;
      });
    });
    const gen = autoGenerate(staffList, year, month, wishdays, constraints, required, SHIFT_HOURS, customShifts, orderConstraints, lockedInitial, prevMonthTail);
    setStaffShifts(prev => {
      const next = {...prev};
      staffList.forEach(emp => {
        next[emp.id] = gen[emp.id] || {};
      });
      return next;
    });
    showMsg("✓ シフトを自動生成しました");
  }

  // ロック操作
  function toggleCellLock(empId,day){
    setLockedCells(prev=>{
      const s=new Set(prev[empId]||[]);
      s.has(day)?s.delete(day):s.add(day);
      return{...prev,[empId]:s};
    });
  }
  function toggleAllLock(empId){
    setLockedCells(prev=>{
      const days=Array.from({length:daysInMonth},(_,i)=>i+1);
      const s=prev[empId]||new Set();
      // 全日ロック済みなら全解除、それ以外は全ロック
      const allLocked=days.every(d=>s.has(d));
      return{...prev,[empId]:allLocked?new Set():new Set(days)};
    });
  }
  function setCellShift(empId,day,type){ setStaffShifts(prev=>({...prev,[empId]:{...(prev[empId]||{}),[day]:type}})); setEditCell(null); }
  function toggleWish(empId,key){ setWishdays(prev=>{ const s=new Set(prev[empId]||[]); s.has(key)?s.delete(key):s.add(key); return{...prev,[empId]:s}; }); }
  function addStaff(){ if(!newName.trim())return; const id=Date.now(); setStaffList(p=>[...p,{id,name:newName.trim(),role:newRole,gender:newGender,color:COLORS[p.length%COLORS.length]}]); setNewName(""); showMsg("✓ 追加しました"); }
  function removeStaff(id){ setStaffList(p=>p.filter(e=>e.id!==id)); }
  function saveEditEmp(){ if(!editEmpName.trim())return; setStaffList(p=>p.map(e=>e.id===editEmpId?{...e,name:editEmpName.trim(),gender:editEmpGender,role:editEmpRole}:e)); setEditEmpId(null); showMsg("✓ 更新しました"); }

  // 共通コンポーネント
  function Pill({type,small}){
    const t=SHIFT_TYPES[type]||FIXED_TYPES["休み"];
    return <span style={{display:"inline-flex",alignItems:"center",justifyContent:"center",padding:small?"2px 5px":"3px 9px",borderRadius:6,fontSize:small?9:11,fontWeight:700,background:t.bg,color:t.text,border:`1px solid ${t.color}55`,minWidth:small?20:28,whiteSpace:"nowrap"}}>{small?t.short:t.label}</span>;
  }
  function CellPicker({empId,dayKey:dk,onClose}){
    return (
      <div style={{position:"absolute",zIndex:200,background:C.surface,border:`1px solid ${C.border2}`,borderRadius:12,boxShadow:"0 8px 32px rgba(0,0,0,0.12)",padding:"10px 12px",display:"flex",flexDirection:"column",gap:5,minWidth:130}}>
        {Object.entries(SHIFT_TYPES).map(([t,v])=>(
          <button key={t} onClick={()=>setCellShift(empId,dk,t)} style={{background:v.bg,color:v.text,border:`1px solid ${v.color}55`,borderRadius:7,padding:"6px 10px",cursor:"pointer",fontWeight:700,fontSize:12,textAlign:"left",fontFamily:"inherit"}}>
            {t} <span style={{fontSize:9,opacity:0.55,marginLeft:4}}>{v.hours}</span>
          </button>
        ))}
        <button onClick={onClose} style={{marginTop:2,fontSize:11,color:C.textMute,background:"none",border:"none",cursor:"pointer",fontFamily:"inherit"}}>キャンセル</button>
      </div>
    );
  }

  // ── 月表示 ────────────────────────────────────────────────
  function MonthView(){
    const days=Array.from({length:daysInMonth},(_,i)=>i+1);
    const prevTailDays = prevMonthTail
      ? Array.from({length:prevMonthTail.tailCount},(_,i)=>prevMonthTail.totalDays-(prevMonthTail.tailCount-1)+i).filter(d=>d>=1)
      : [];
    return (
      <div style={{overflowX:"auto"}}>
        <table style={{borderCollapse:"collapse",width:"100%",minWidth:900,fontSize:11}}>
          <thead>
            <tr>
              <th style={{...S.th(150),textAlign:"left",paddingLeft:12}}>氏名</th>
              {/* 先月末グレー列ヘッダー（印刷非対象） */}
              {prevTailDays.map(d=>{
                const prevMonth2 = month===0?11:month-1;
                const dow=getDow(month===0?year-1:year, prevMonth2, d);
                return (
                  <th key={`prev-${d}`} className="no-print" style={{...S.th(28),color:"#cbd5e1",background:"#f8fafc",opacity:0.7}}>
                    <div style={{fontSize:8,color:"#94a3b8"}}>{d}</div>
                    <div style={{fontSize:7,color:"#cbd5e1"}}>{DOW[dow]}</div>
                  </th>
                );
              })}
              {/* 区切り */}
              {prevTailDays.length>0&&<th className="no-print" style={{width:4,background:"#e2e8f0",padding:0}}/>}
              {days.map(d=>{
                const dow=getDow(year,month,d);
                const isToday=d===today.getDate()&&month===today.getMonth()&&year===today.getFullYear();
                return (
                  <th key={d} style={{...S.th(32),color:dow===0?"#ef4444":dow===6?"#3b82f6":C.textMute,background:isToday?"#eff6ff":dow===0?"#fff5f5":dow===6?"#f0f8ff":C.surface}}>
                    <div style={{fontWeight:700}}>{d}</div>
                    <div style={{fontSize:8}}>{DOW[dow]}</div>
                    {isToday&&<div style={{width:4,height:4,borderRadius:"50%",background:C.accent,margin:"1px auto 0"}}/>}
                  </th>
                );
              })}
              <th style={S.th(52)}>勤務</th><th style={S.th(56)}>時間</th><th style={S.th(36)}>状態</th>
            </tr>
          </thead>
          <tbody>
            {staffList.map((emp,ei)=>{
              const st=stats.find(s=>s.id===emp.id);
              const locked=lockedCells[emp.id]||new Set();
              const days2=Array.from({length:daysInMonth},(_,i)=>i+1);
              const allLocked=days2.every(d=>locked.has(d));
              const anyLocked=days2.some(d=>locked.has(d));
              return (
                <tr key={emp.id} style={{background:ei%2===0?C.surface:C.surface2}}>
                  <td style={{padding:"5px 12px",borderBottom:`1px solid ${C.border}`,whiteSpace:"nowrap"}}>
                    <div style={{display:"flex",alignItems:"center",gap:6}}>
                      <span style={{width:8,height:8,borderRadius:"50%",background:emp.color,flexShrink:0}}/>
                      <div style={{flex:1}}>
                        <div style={{fontWeight:600,fontSize:12}}>{emp.name}</div>
                        <div style={{fontSize:9,color:C.textMute}}>{emp.role}</div>
                      </div>
                      <button
                        onClick={()=>toggleAllLock(emp.id)}
                        title={allLocked?"全解除":"全ロック"}
                        style={{background:allLocked?"#fef9ee":anyLocked?"#fffbeb":C.surface2,border:`1px solid ${allLocked?"#d97706":anyLocked?"#fbbf24":C.border}`,borderRadius:6,cursor:"pointer",fontSize:10,padding:"2px 5px",color:allLocked?"#92400e":anyLocked?"#b45309":C.textMute,fontWeight:700,lineHeight:1,flexShrink:0}}>
                        {allLocked?"🔒全":"🔓全"}
                      </button>
                    </div>
                  </td>
                  {/* 先月末グレーセル（印刷非対象） */}
                  {prevTailDays.map(d=>{
                    const t=prevMonthTail?.shifts?.[emp.id]?.[d]||"休み";
                    const st2=SHIFT_TYPES[t]||FIXED_TYPES["休み"];
                    return (
                      <td key={`prev-${d}`} className="no-print" style={{padding:"2px 1px",borderBottom:`1px solid ${C.border}`,textAlign:"center",background:"#f8fafc",opacity:0.55}}>
                        <span style={{display:"inline-flex",alignItems:"center",justifyContent:"center",padding:"2px 4px",borderRadius:5,fontSize:9,fontWeight:700,background:"#f1f5f9",color:"#94a3b8",border:"1px solid #e2e8f0",minWidth:18,whiteSpace:"nowrap"}}>{st2.short}</span>
                      </td>
                    );
                  })}
                  {prevTailDays.length>0&&<td className="no-print" style={{width:4,background:"#e2e8f0",padding:0,borderBottom:`1px solid ${C.border}`}}/>}
                  {days.map(d=>{
                    const type=staffShifts[emp.id]?.[d]||"休み";
                    const cid=`${emp.id}-${d}`, isOpen=editCell===cid;
                    const isLocked=locked.has(d);
                    let pressTimer=null;
                    const onPressStart=()=>{ pressTimer=setTimeout(()=>{ toggleCellLock(emp.id,d); pressTimer=null; },500); };
                    const onPressEnd=()=>{ if(pressTimer){clearTimeout(pressTimer);pressTimer=null;} };
                    return (
                      <td key={d} style={{padding:"2px 1px",borderBottom:`1px solid ${C.border}`,textAlign:"center",position:"relative",background:isLocked?"#fffbeb":""}}>
                        <button
                          onClick={()=>setEditCell(isOpen?null:cid)}
                          onMouseDown={onPressStart} onMouseUp={onPressEnd} onMouseLeave={onPressEnd}
                          onTouchStart={onPressStart} onTouchEnd={onPressEnd}
                          onContextMenu={e=>e.preventDefault()}
                          style={{background:"none",border:"none",cursor:"pointer",padding:1,position:"relative",WebkitUserSelect:"none",userSelect:"none"}}>
                          <Pill type={type} small/>
                          {isLocked&&<span style={{position:"absolute",top:-3,right:-3,fontSize:7,lineHeight:1}}>🔒</span>}
                        </button>
                        {isOpen&&<div style={{position:"absolute",top:"100%",left:"50%",transform:"translateX(-50%)",zIndex:200}}><CellPicker empId={emp.id} dayKey={d} onClose={()=>setEditCell(null)}/></div>}
                      </td>
                    );
                  })}
                  <td style={{textAlign:"center",fontWeight:700,color:st?.daysOk?C.green:C.amber,borderBottom:`1px solid ${C.border}`,fontSize:11}}>{st?.workDays??0}日</td>
                  <td style={{textAlign:"center",fontWeight:700,color:st?.hoursOk?C.green:C.amber,borderBottom:`1px solid ${C.border}`,fontSize:11}}>{st?.workHours??0}h</td>
                  <td style={{textAlign:"center",borderBottom:`1px solid ${C.border}`}}>{(st?.daysOk&&st?.hoursOk)?<span style={{color:C.green}}>✓</span>:<span style={{color:C.amber}}>⚠</span>}</td>
                </tr>
              );
            })}
          </tbody>
        </table>
      </div>
    );
  }

              {weekDates.map((d,i)=>{

                    <div style={{fontWeight:700}}>{DOW[dow]}</div>
                    <div style={{fontSize:10}}>{d.getMonth()+1}/{d.getDate()}</div>
                    {isToday&&<div style={{fontSize:9,color:C.accent,fontWeight:700}}>TODAY</div>}
                  </th>
                );
              })}

          </thead>
          <tbody>

                  <div style={{display:"flex",alignItems:"center",gap:8}}>
                    <span style={{width:8,height:8,borderRadius:"50%",background:emp.color}}/>
                    <div><div style={{fontWeight:600}}>{emp.name}</div><div style={{fontSize:10,color:C.textMute}}>{emp.role}</div></div>
                  </div>
                </td>
                {weekDates.map((d,i)=>{
                  const inMonth=d.getMonth()===month&&d.getFullYear()===year;

                  const cid=`w-${emp.id}-${d.toDateString()}`, isOpen=editCell===cid;

                      <button onClick={()=>inMonth&&setEditCell(isOpen?null:cid)} style={{background:"none",border:"none",cursor:inMonth?"pointer":"default",padding:0}}>

                        {inMonth&&!["休み","希望休"].includes(type)&&<div style={{fontSize:9,color:C.textMute,marginTop:2}}>{SHIFT_TYPES[type]?.hours}</div>}
                      </button>
                      {isOpen&&inMonth&&<div style={{position:"absolute",top:"100%",left:"50%",transform:"translateX(-50%)"}}><CellPicker empId={emp.id} dayKey={d.getDate()} onClose={()=>setEditCell(null)}/></div>}
                    </td>
                  );
                })}
              </tr>
            ))}
          </tbody>
        </table>
      </div>

  // ── 希望休タブ ────────────────────────────────────────────

  // ── 従業員管理タブ ────────────────────────────────────────
  function EmployeeTab(){
    return (

  // ── 必要人数タブ ──────────────────────────────────────────
  function RequiredTab(){
    const [editKey, setEditKey] = useState(null); // 編集中のシフトkey
    const [editForm, setEditForm] = useState({label:"",startH:9,endH:18});
    const [newForm, setNewForm] = useState({label:"",startH:9,endH:18});
    const PILL_COLORS_LIST = [
      {color:"#d97706",bg:"#fef9ee",text:"#92400e"},
      {color:"#3b82f6",bg:"#eff6ff",text:"#1e40af"},
      {color:"#059669",bg:"#f0fdf7",text:"#065f46"},
      {color:"#7c3aed",bg:"#f5f3ff",text:"#4c1d95"},
      {color:"#e11d48",bg:"#fff1f2",text:"#9f1239"},
      {color:"#0891b2",bg:"#ecfeff",text:"#164e63"},
      {color:"#65a30d",bg:"#f7fee7",text:"#3a5c02"},
      {color:"#c026d3",bg:"#fdf4ff",text:"#701a75"},
    ];

    function startEdit(s){
      setEditKey(s.key);
      setEditForm({label:s.label, startH:s.startH, endH:s.endH});
    }
    function saveEdit(){
      if(!editForm.label.trim()) return;
      const newKey=editForm.label.trim();
      setCustomShifts(prev=>prev.map(s=>{
        if(s.key!==editKey) return s;
        return {...s, key:newKey, label:newKey, short:newKey.slice(0,1), startH:Number(editForm.startH), endH:Number(editForm.endH)};
      }));
      // keyが変わった場合はrequired・orderConstraintsも移行
      if(newKey!==editKey){
        setRequired(prev=>{ const n={...prev}; n[newKey]=n[editKey]||0; delete n[editKey]; return n; });
        setOrderConstraints(prev=>{
          const n={};
          Object.entries(prev).forEach(([k,v])=>{
            const newK=k===editKey?newKey:k;
            n[newK]=v.map(x=>x===editKey?newKey:x);
          });
          return n;
        });
      }
      setEditKey(null);
    }
    function addShift(){
      if(!newForm.label.trim()) return;
      const key=newForm.label.trim();
      if(customShifts.some(s=>s.key===key)){ alert("同じ名前のシフトが既に存在します"); return; }
      const idx=customShifts.length%PILL_COLORS_LIST.length;
      const pc=PILL_COLORS_LIST[idx];
      setCustomShifts(prev=>[...prev,{key, label:key, short:key.slice(0,1), startH:Number(newForm.startH), endH:Number(newForm.endH), color:pc.color, bg:pc.bg, text:pc.text}]);
      setRequired(prev=>({...prev,[key]:1}));
      setNewForm({label:"",startH:9,endH:18});
    }
    function deleteShift(key){
      if(!window.confirm(`「${key}」を削除しますか？`)) return;
      setCustomShifts(prev=>prev.filter(s=>s.key!==key));
      setRequired(prev=>{ const n={...prev}; delete n[key]; return n; });
      setOrderConstraints(prev=>{
        const n={};
        Object.entries(prev).forEach(([k,v])=>{ if(k!==key) n[k]=v.filter(x=>x!==key); });
        return n;
      });
    }

    const numSel = (val, onChange, min, max) => (
      <input type="number" value={val} min={min} max={max} onChange={e=>onChange(Number(e.target.value))}
        style={{...S.input, width:64, minWidth:64, padding:"5px 8px", fontSize:13, textAlign:"center"}}/>
    );

    return (
      <div>
        <p style={{color:C.textSub,fontSize:13,marginBottom:16}}>勤務形態の追加・編集・削除と、必要人数・順序制約を設定します。</p>

        {/* シフト一覧 */}
        <div style={{display:"flex",flexDirection:"column",gap:8,marginBottom:24}}>
          {customShifts.map(s=>{
            const t=SHIFT_TYPES[s.key];
            const isEdit=editKey===s.key;
            return (
              <div key={s.key} style={{...S.card,padding:"12px 16px",border:isEdit?`2px solid ${C.accent}`:`1px solid ${C.border}`}}>
                {isEdit?(
                  <div style={{display:"flex",gap:10,flexWrap:"wrap",alignItems:"flex-end"}}>
                    <div>
                      <label style={S.label}>名称</label>
                      <input value={editForm.label} onChange={e=>setEditForm(f=>({...f,label:e.target.value}))}
                        style={{...S.input,width:90,minWidth:90,padding:"5px 8px"}}/>
                    </div>
                    <div>
                      <label style={S.label}>開始（時）</label>
                      {numSel(editForm.startH, v=>setEditForm(f=>({...f,startH:v})), 0, 30)}
                    </div>
                    <div>
                      <label style={S.label}>終了（時）</label>
                      {numSel(editForm.endH, v=>setEditForm(f=>({...f,endH:v})), 1, 31)}
                    </div>
                    <div>
                      <label style={S.label}>必要人数</label>
                      <input type="number" min={0} max={staffList.length} value={required[s.key]||0}
                        onChange={e=>setRequired(p=>({...p,[s.key]:Number(e.target.value)}))}
                        style={{...S.input,width:64,minWidth:64,padding:"5px 8px"}}/>
                    </div>
                    <button onClick={saveEdit} style={{...S.btn(C.accent),padding:"7px 16px"}}>保存</button>
                    <button onClick={()=>setEditKey(null)} style={{...S.btn(C.surface2,C.textSub),border:`1px solid ${C.border}`,padding:"7px 14px"}}>✕</button>
                  </div>
                ):(
                  <div style={{display:"flex",alignItems:"center",gap:12,flexWrap:"wrap"}}>
                    <div style={{minWidth:60}}><Pill type={s.key}/></div>
                    <div style={{fontSize:12,color:C.textSub,flex:1}}>{fmt2(s.startH)}:00 〜 {s.endH>24?`翌${fmt2(s.endH-24)}:00`:`${fmt2(s.endH)}:00`}　必要 <strong style={{color:C.text}}>{required[s.key]||0}名</strong></div>
                    <button onClick={()=>startEdit(s)} style={{...S.btn(C.surface,C.accent),border:`1px solid ${C.border}`,fontSize:12,padding:"4px 12px"}}>編集</button>
                    <button onClick={()=>deleteShift(s.key)} style={{...S.btn(C.surface,C.red),border:`1px solid ${C.border}`,fontSize:12,padding:"4px 12px"}}>削除</button>
                  </div>
                )}
              </div>
            );
          })}
        </div>

        {/* 新規追加フォーム */}
        <div style={{...S.card,padding:"16px",marginBottom:24,border:`1.5px dashed ${C.border2}`}}>
          <div style={{fontWeight:700,fontSize:13,color:C.textSub,marginBottom:12}}>＋ 新しい勤務形態を追加</div>
          <div style={{display:"flex",gap:10,flexWrap:"wrap",alignItems:"flex-end"}}>
            <div>
              <label style={S.label}>名称</label>
              <input value={newForm.label} onChange={e=>setNewForm(f=>({...f,label:e.target.value}))}
                onKeyDown={e=>e.key==="Enter"&&addShift()} placeholder="例：準夜勤"
                style={{...S.input,width:100,minWidth:100,padding:"5px 8px"}}/>
            </div>
            <div>
              <label style={S.label}>開始（時）</label>
              {numSel(newForm.startH, v=>setNewForm(f=>({...f,startH:v})), 0, 30)}
            </div>
            <div>
              <label style={S.label}>終了（時）</label>
              {numSel(newForm.endH, v=>setNewForm(f=>({...f,endH:v})), 1, 31)}
            </div>
            <button onClick={addShift} style={{...S.btn(C.green),padding:"7px 16px"}}>追加</button>
          </div>
        </div>

        {/* 順序制約 */}
        <div style={S.card}>
          <div style={{fontWeight:700,fontSize:13,marginBottom:10}}>順序制約</div>
          <div style={{overflowX:"auto"}}>
            <table style={{borderCollapse:"collapse",fontSize:12}}>
              <thead>
                <tr>
                  <th style={{...S.th(80),textAlign:"left",paddingLeft:8}}>前日↓ 翌日→</th>
                  {customShifts.map(s=><th key={s.key} style={S.th(60)}><Pill type={s.key} small/></th>)}
                </tr>
              </thead>
              <tbody>
                {customShifts.map((from,fi)=>(
                  <tr key={from.key} style={{background:fi%2===0?C.surface:C.surface2}}>
                    <td style={{padding:"6px 8px",borderBottom:`1px solid ${C.border}`}}><Pill type={from.key}/></td>
                    {customShifts.map(to=>{
                      const isSelf=from.key===to.key, isOn=(orderConstraints[from.key]||[]).includes(to.key);
                      return (
                        <td key={to.key} style={{textAlign:"center",padding:"6px 4px",borderBottom:`1px solid ${C.border}`}}>
                          {isSelf?<span style={{color:C.textMute}}>—</span>:(
                            <button onClick={()=>setOrderConstraints(prev=>{ const cur=prev[from.key]||[]; return {...prev,[from.key]:isOn?cur.filter(x=>x!==to.key):[...cur,to.key]}; })}
                              style={{width:32,height:28,borderRadius:6,cursor:"pointer",fontWeight:700,fontSize:11,border:isOn?`2px solid ${C.red}`:`1px solid ${C.border}`,background:isOn?C.redBg:C.surface,color:isOn?C.red:C.textMute,fontFamily:"inherit"}}>
                              {isOn?"✕":""}
                            </button>
                          )}
                        </td>
                      );
                    })}
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
          <div style={{marginTop:8,fontSize:11,color:C.textMute}}>✕ = 前日のシフトの翌日には入れない</div>
        </div>
      </div>
    );
  }

  return (
    <div style={{fontFamily:"'Noto Sans JP',sans-serif",background:C.bg,minHeight:"100vh",color:C.text}} onClick={()=>editCell&&setEditCell(null)}>
      <div style={{background:C.surface,borderBottom:`1px solid ${C.border}`,padding:"10px 14px 0",boxShadow:"0 1px 6px rgba(0,0,0,0.06)"}}>
        <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:8,flexWrap:"wrap"}}>
          <h1 style={{margin:0,fontSize:16,fontWeight:900,color:C.text}}>勤務表</h1>
          <div style={{display:"flex",gap:6,marginLeft:"auto",flexWrap:"wrap"}}>
            <button onClick={runAutoGenerate} style={{...S.btn(C.green),fontSize:12,padding:"6px 12px"}}>⚡ 自動生成</button>
            <button onClick={confirmAndNextMonth} style={{...S.btn("#7c3aed"),fontSize:12,padding:"6px 12px"}}>✅ 確定して翌月へ</button>
            <button onClick={exportPDF} style={{...S.btn("#e11d48"),fontSize:12,padding:"6px 12px"}}>🖨 プレビュー</button>
          </div>
        </div>
        {msg&&<div style={{marginBottom:8}}><span style={{fontSize:11,color:C.green,fontWeight:700,background:C.greenBg,border:`1px solid ${C.green}44`,borderRadius:6,padding:"3px 10px"}}>{msg}</span></div>}
        <div style={{display:"flex",gap:2,overflowX:"auto"}}>
          {TABS.map(([key,label])=>{
            const isAlert=key==="alert";
            return (
              <button key={key} onClick={()=>setTab(key)} style={{padding:"8px 14px",border:"none",background:"none",color:tab===key?(isAlert&&totalAlerts>0?C.red:C.accent):C.textSub,fontWeight:tab===key?700:500,cursor:"pointer",fontSize:12,borderBottom:tab===key?`2px solid ${isAlert&&totalAlerts>0?C.red:C.accent}`:"2px solid transparent",whiteSpace:"nowrap",fontFamily:"inherit",position:"relative"}}>
                {label}
                {isAlert&&totalAlerts>0&&<span style={{marginLeft:4,background:C.red,color:"#fff",borderRadius:10,padding:"1px 6px",fontSize:10,fontWeight:700}}>{totalAlerts}</span>}
              </button>
            );
          })}
        </div>
      </div>
      <div style={{background:C.surface,margin:"16px",borderRadius:14,border:`1px solid ${C.border}`,boxShadow:"0 2px 8px rgba(0,0,0,0.05)",padding:20}}>
        {tab==="shift"&&(
          <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:16,flexWrap:"wrap"}}>
            <div style={{display:"flex",alignItems:"center",gap:6,background:C.surface2,borderRadius:9,padding:"4px 8px",border:`1px solid ${C.border}`}}>
              <button onClick={()=>{ if(view==="week"){const nd=new Date(currentDate);nd.setDate(nd.getDate()-7);setCurrentDate(nd);}else setCurrentDate(new Date(year,month-1,1)); }} style={{background:"none",border:"none",cursor:"pointer",fontSize:18,color:C.textSub,padding:"0 4px"}}>‹</button>
              <span style={{fontWeight:800,fontSize:14,minWidth:170,textAlign:"center"}}>{headerLabel}</span>
              <button onClick={()=>{ if(view==="week"){const nd=new Date(currentDate);nd.setDate(nd.getDate()+7);setCurrentDate(nd);}else setCurrentDate(new Date(year,month+1,1)); }} style={{background:"none",border:"none",cursor:"pointer",fontSize:18,color:C.textSub,padding:"0 4px"}}>›</button>
            </div>
            <div style={{display:"flex",gap:3,background:C.surface2,borderRadius:9,padding:3,border:`1px solid ${C.border}`}}>
              {["month","week"].map(v=>(
                <button key={v} onClick={()=>setView(v)} style={{padding:"6px 14px",borderRadius:7,border:"none",background:view===v?C.accent:"transparent",color:view===v?"#fff":C.textSub,fontWeight:700,cursor:"pointer",fontSize:12,fontFamily:"inherit"}}>
                  {v==="month"?"月表示":"週表示"}
                </button>
              ))}
            </div>
          </div>
        )}
        <div onClick={e=>e.stopPropagation()}>
          {tab==="shift"&&view==="month"&&<MonthView/>}
          {tab==="shift"&&view==="week"&&<WeekView/>}
          {tab==="personal"&&<PersonalTab/>}
          {tab==="wish"&&<WishTab/>}
          {tab==="alert"&&<AlertTab/>}
          {tab==="constraints"&&<ConstraintsTab/>}
          {tab==="employee"&&<EmployeeTab/>}
          {tab==="required"&&<RequiredTab/>}
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));
</script>
<script>
window.addEventListener("load",function(){
  try{
    var src=document.getElementById("app-src").textContent;
    var out=Babel.transform(src,{presets:["react"]}).code;
    eval(out);
    document.getElementById("loading").style.display="none";
    document.getElementById("root").style.display="block";
  }catch(e){
    document.getElementById("loading").innerHTML="<div style='color:#ef4444;padding:20px;font-size:13px'>エラー: "+e.message+"</div>";
    console.error(e);
  }
});
</script>
</body>
</html>
